name: Claw Stock Monitor

on:
  schedule:
    # Runs roughly every 5 minutes (GitHub's minimum; timing isn't exact).
    - cron: "*/5 * * * *"
  workflow_dispatch:   # lets you run it manually from the Actions tab to test

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run stock check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SKU: "6680914"
        run: python check_claw.py
